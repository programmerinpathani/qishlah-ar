<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>RIB Heritage AR Experience</title>

  <!-- A-Frame core -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- AR.js for A-Frame (marker tracking) -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    :root {
      --rib-red: #E11B22;
      --rib-blue: #1B3F9E;
      --rib-green: #1FA24A;
    }
    html, body { margin: 0; padding: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    /* Start overlay: needed so the video can play with sound on tap (mobile autoplay policy) */
    #startScreen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(160deg, #0b1a3f 0%, #12245c 60%, #1B3F9E 100%);
      color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    #startScreen .badge {
      font-weight: 800; font-size: 40px; letter-spacing: 1px;
      color: #fff; margin-bottom: 6px;
    }
    #startScreen .badge span { color: var(--rib-red); }
    #startScreen h1 { font-size: 22px; font-weight: 700; margin: 12px 0 4px; }
    #startScreen p { font-size: 15px; opacity: .85; max-width: 320px; line-height: 1.5; margin: 6px 0 24px; }
    #startBtn {
      background: var(--rib-red); color: #fff; border: none;
      padding: 16px 40px; font-size: 18px; font-weight: 700; border-radius: 999px;
      cursor: pointer; box-shadow: 0 8px 24px rgba(225,27,34,.45);
    }
    #startBtn:active { transform: scale(.97); }
    /* Force-hide A-Frame's VR / enter-AR buttons — this is a marker AR experience, not headset VR */
    .a-enter-vr, .a-enter-ar, .a-enter-vr-button, .a-enter-ar-button,
    .a-orientation-modal { display: none !important; }

    #hint {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      z-index: 50; background: rgba(0,0,0,.55); color: #fff;
      padding: 10px 18px; border-radius: 999px; font-size: 14px;
      display: none; backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>

  <!-- Tap-to-start screen (required to unlock video audio on mobile) -->
  <div id="startScreen">
    <div class="badge">r<span>i</span>b</div>
    <h1>Heritage AR Experience</h1>
    <p>Point your camera at the printed marker to bring the story to life. Tap below and allow camera access to begin.</p>
    <button id="startBtn">Start Experience</button>
  </div>

  <div id="hint">Point your camera at the marker</div>

  <!-- AR Scene -->
  <a-scene
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium;"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

    <!-- Preload the heritage video. Replace assets/experience.mp4 with your final export. -->
    <a-assets>
      <video id="heritageVideo"
             src="assets/experience.mp4"
             preload="auto"
             loop="false"
             crossorigin="anonymous"
             playsinline
             webkit-playsinline></video>
    </a-assets>

    <!-- Hiro marker: print the standard AR.js "Hiro" marker -->
    <a-marker type="pattern" preset="hiro" id="marker" smooth="true" smoothCount="6" smoothTolerance="0.01">
      <!-- Video plays as a flat plane sitting on the marker -->
      <a-video
        id="videoPlane"
        src="#heritageVideo"
        width="1.6"
        height="0.9"
        position="0 0.1 0"
        rotation="-90 0 0">
      </a-video>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const startScreen = document.getElementById('startScreen');
    const startBtn = document.getElementById('startBtn');
    const hint = document.getElementById('hint');
    const video = document.getElementById('heritageVideo');
    const marker = document.getElementById('marker');

    let markerVisible = false;

    startBtn.addEventListener('click', () => {
      // Prime the video so it can play with audio after a user gesture
      video.muted = false;
      video.play().then(() => { video.pause(); video.currentTime = 0; })
                   .catch(() => { /* will play when marker is found */ });
      startScreen.style.display = 'none';
      hint.style.display = 'block';
    });

    marker.addEventListener('markerFound', () => {
      markerVisible = true;
      hint.style.display = 'none';
      video.play().catch(err => console.warn('Video play blocked:', err));
    });

    marker.addEventListener('markerLost', () => {
      markerVisible = false;
      video.pause();
      hint.style.display = 'block';
    });

    // Restart the clip if it ends while the marker is still in view
    video.addEventListener('ended', () => {
      if (markerVisible) { video.currentTime = 0; video.play(); }
    });
  </script>

</body>
</html>
